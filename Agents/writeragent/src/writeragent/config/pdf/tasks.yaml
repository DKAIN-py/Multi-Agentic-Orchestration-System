# --- PDF TASK ---
pdf_task:
  description: >
    Analyze the following request: "{raw_data}".
    
    1. Organize the information into a Report structure (Title, Executive Summary, Key Data).
    2. Format any list or data into a Markdown Table.
    3. **MANDATORY:** Call the `PDF File Writing Tool`.
       - `filename`: Must end in `.pdf` (e.g., "Project_Report.pdf").
       - `content`: The structured Markdown you created.
  expected_output: >
    A confirmation message from the tool (e.g., "PDF Created...").
  agent: pdf_specialist