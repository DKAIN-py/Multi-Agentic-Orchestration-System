text_task:
  description: >
    Analyze the following request: "{data}".
    
    1. Determine if the user wants a plain text file (`.txt`) or a Markdown file (`.md`).
    2. Write the content clearly.
    3. **MANDATORY:** Call the `Textual File Writing Tool`.
       - `filename`: Use `.txt` or `.md` as appropriate.
       - `content`: The final text body.
  expected_output: >
    A confirmation message from the tool.
  agent: text_specialist