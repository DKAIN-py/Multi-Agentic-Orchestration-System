docx_task:
  description: >
    Analyze the following request: "{raw_data}".
    
    1. Draft a professional document based on the input.
    2. Ensure proper hierarchy using `#` and `##`.
    3. **MANDATORY:** Call the `Docx File Writing Tool`.
       - `filename`: Must end in `.docx` (e.g., "Draft_Document.docx").
       - `content`: The formatted Markdown text.
  expected_output: >
    A confirmation message from the tool.
  agent: docx_specialist