extracting:
  description: >
    Analyze the following input text: "{input_text}".
    
    You need to extract:
    1. **The Target List:** A list of names (e.g., ['John', 'Jane']) OR a Group Flag (e.g., 'ALL_CLIENTS', 'ALL_EMPLOYEES').
    2. The Type of person (Client vs. Employee).
    3. The Type of Message and Tone.
    4. The sending signal (directly or check first)
    **CRITICAL:** If the user says "Send to all clients", do not invent names. Just output the flag 'ALL_CLIENTS'.
  expected_output: >
    A structured object containing a **List of Names (or group flag)**, Person Type, Message Type, and Tone.
  agent: info_extracter

contact_info:
  description: >
    Use the extracted targets from the previous task to query the database.
    
    1. **CASE: LIST OF NAMES** -> Construct a SQL query to find these specific names in the database.
    2. **CASE: GROUP FLAG ('ALL_CLIENTS')** -> Execute a query to SELECT all records from the 'clients' table.
    3. **CASE: GROUP FLAG ('ALL_EMPLOYEES')** -> Execute a query to SELECT all records from the 'employees' table.
    
    Ensure you retrieve the Email and Phone columns for every match.
  expected_output: >
    **A List of Dictionaries**, where each item contains {Name, Email, Phone}.
  agent: contact_info

content_gen_task:
  description: >
    Draft the message content based on "{input_text}".
    
    1. If the recipient list contains only one person, address them by Name.
    2. **If the recipient list contains multiple people**, use a generic but polite greeting (e.g., "Hello," or "Hi Team,").
    3. Adhere to the Tone and Message Type.
  expected_output: >
    The final message body text ready for distribution.
  agent: content_gen

content_verifi_task:
  description: >
    You have the **Drafted Message** and the **Extraction Data**.
    
    **STEP 1: CHECK THE 'REQUIRES_REVIEW' FLAG.**
    Look at the output from the Extraction Agent.
    
    **CASE A: requires_review is False (User said "Directly")**
    - DO NOT use the tool.
    - DO NOT ask the human.
    - Simply return the Drafted Message exactly as it is.
    
    **CASE B: requires_review is True (Default)**
    - You MUST use the 'Ask Human for Review' tool.
    - Input the draft into the tool.
    - If the tool output is "ok", return the draft.
    - If the tool output contains changes, REWRITE the message and return the new version.
  expected_output: >
    The final approved message string.
  agent: content_verifi

sending_output:
  description: >
    You have three sources of context:
    1. **Extraction Logic** (Contains 'Message Type' -> e.g., 'WhatsApp' or 'Email').
    2. **Contact Info** (Contains Email and Phone).
    3. **Drafted Message** (The text to send).

    **STEP 1: CHECK THE MESSAGE TYPE.**
    Look at the output from the Extraction Logic. 
    - If Message Type is 'WhatsApp' or 'SMS': **YOU MUST USE THE WHATSAPP TOOL.**
    - If Message Type is 'Email': Use the Email Tool.

    **STEP 2: SELECT RECIPIENT.**
    - If using WhatsApp: Use the **Phone Number** from Contact Info.
    - If using Email: Use the **Email Address** from Contact Info.
    
    **STEP 3: EXECUTE.**
    Send the message using the correct tool. Do not fallback to email if WhatsApp is requested.
  expected_output: >
    A confirmation log stating EXACTLY which tool was used (e.g., "Sent via WhatsApp to +123...").
  agent: send_output