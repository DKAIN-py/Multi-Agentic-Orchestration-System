RecurimentExtracter_task:
  description: >
    Analyze the following job description: 
    "{job_description}"

    Your job is to populate the structured model. Follow these rules for specific fields:

    - **skills**: Extract a list of specific technologies (e.g., "Python", "AWS"). Ignore generic terms like "Hard worker".
    - **experience**: Look for keywords like "Junior" (1-3 yrs), "Senior" (5+ yrs), or explicit years.
    - **budget**: Look for "$/hr" or annual salary. If annual, convert to approx hourly (Salary / 2000). 
    - **location**: Detect "Remote", "Hybrid", or specific cities.
    - **domain**: Infer the industry based on the company description or project details.
    
    **EXCEPTION HANDLING:**
    - If a field is missing in the text, rely on the Pydantic model's default values (e.g. for gender/age).
    - If the text says "Entry Level" but no budget is given, infer a "Market Standard" budget note in the budget field rather than "None".
  
  expected_output: >
    A fully populated RecuirementExtracter object with no missing required fields.
  agent: RecurimentExtracter

candidate_finding_task:
  description: >
    Take the structured requirements (RecuirementExtracter object) from the previous task.
    
    1. **Strategy:**
       - Use `skills` and `location` to form your search query.
       - Use `budget` as a filter. If the candidate's rate is higher than the budget, discard them.
    
    2. **Execution:**
       - Run `dbsearch` first with the top 2 skills.
       - If < 5 results, run `customSearch` on LinkedIn.
       - SAVE any new good matches using `candidateSaver`.
       
    3. **Ranking:**
       - Prioritize candidates who match the 'experience' level.
       - If 'domain' was extracted (e.g., Fintech), prioritize candidates with that specific background.
  
  expected_output: >
    A list of 10 candidates. Each entry must contain: Name, Profile Link, Matches Skills (Yes/No), and Estimated Rate.
  agent: CandidateFinder